name: Temporary lockfile metadata fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.head_ref == 'chore/align-package-lock-engine'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.0
          cache: npm

      - name: Align root package-lock engine metadata
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'package-lock.json';
          const lockfile = JSON.parse(fs.readFileSync(path, 'utf8'));
          const expected = '>=20.0.0 <25';
          const replacement = '^20.19.0 || ^22.12.0 || ^24.0.0';
          const current = lockfile.packages?.['']?.engines?.node;

          if (current !== expected) {
            throw new Error(`Unexpected root engine metadata: ${JSON.stringify(current)}`);
          }

          lockfile.packages[''].engines.node = replacement;
          fs.writeFileSync(path, `${JSON.stringify(lockfile, null, 2)}\n`, 'utf8');
          NODE

      - name: Confirm metadata-only diff
        shell: bash
        run: |
          test "$(git diff --name-only)" = "package-lock.json"
          git diff --unified=0 -- package-lock.json > /tmp/package-lock.diff
          node <<'NODE'
          const fs = require('node:fs');
          const lines = fs.readFileSync('/tmp/package-lock.diff', 'utf8').split(/\r?\n/);
          const removed = lines.filter((line) => line.startsWith('-') && !line.startsWith('---'));
          const added = lines.filter((line) => line.startsWith('+') && !line.startsWith('+++'));
          const expectedRemoved = ['-        "node": ">=20.0.0 <25"'];
          const expectedAdded = ['+        "node": "^20.19.0 || ^22.12.0 || ^24.0.0"'];

          if (JSON.stringify(removed) !== JSON.stringify(expectedRemoved) ||
              JSON.stringify(added) !== JSON.stringify(expectedAdded)) {
            throw new Error(`Unexpected lockfile diff. Removed=${JSON.stringify(removed)} Added=${JSON.stringify(added)}`);
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Check whitespace
        run: git diff --check

      - name: Commit validated lockfile metadata
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: align package-lock Node engine metadata"
          git push
