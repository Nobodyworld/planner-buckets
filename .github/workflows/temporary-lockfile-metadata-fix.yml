name: Temporary lockfile metadata fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.head_ref == 'chore/align-package-lock-engine'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.0
          cache: npm

      - name: Align root package-lock engine metadata
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('package-lock.json')
          text = path.read_text(encoding='utf-8')
          boundary = '    "node_modules/@adobe/css-tools": {'
          old = '        "node": ">=20.0.0 <25"'
          new = '        "node": "^20.19.0 || ^22.12.0 || ^24.0.0"'

          if boundary not in text:
              raise SystemExit('Could not locate the first dependency boundary')

          root, dependencies = text.split(boundary, 1)
          if root.count(old) != 1:
              raise SystemExit(f'Expected one old root engine entry, found {root.count(old)}')

          path.write_text(root.replace(old, new) + boundary + dependencies, encoding='utf-8')
          PY

      - name: Confirm metadata-only diff
        shell: bash
        run: |
          test "$(git diff --name-only)" = "package-lock.json"
          git diff --unified=0 -- package-lock.json > /tmp/package-lock.diff
          python - <<'PY'
          from pathlib import Path

          lines = Path('/tmp/package-lock.diff').read_text(encoding='utf-8').splitlines()
          removed = [line for line in lines if line.startswith('-') and not line.startswith('---')]
          added = [line for line in lines if line.startswith('+') and not line.startswith('+++')]

          expected_removed = ['-        "node": ">=20.0.0 <25"']
          expected_added = ['+        "node": "^20.19.0 || ^22.12.0 || ^24.0.0"']

          if removed != expected_removed or added != expected_added:
              raise SystemExit(
                  f'Unexpected lockfile diff. Removed={removed!r}; Added={added!r}'
              )
          PY

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Check whitespace
        run: git diff --check

      - name: Commit validated lockfile metadata
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: align package-lock Node engine metadata"
          git push
