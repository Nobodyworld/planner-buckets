name: Temporary lockfile metadata fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.head_ref == 'chore/align-package-lock-engine'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.0
          cache: npm

      - name: Align root package-lock engine metadata
        shell: bash
        run: |
          grep -q '"node": ">=20.0.0 <25"' package-lock.json
          sed -i '0,/"node": ">=20.0.0 <25"/s//"node": "^20.19.0 || ^22.12.0 || ^24.0.0"/' package-lock.json

      - name: Confirm metadata-only diff
        shell: bash
        run: |
          test "$(git diff --name-only)" = "package-lock.json"
          test "$(git diff --numstat -- package-lock.json)" = $'1\t1\tpackage-lock.json'
          test "$(git diff --unified=0 -- package-lock.json | grep '^-' | grep -v '^---')" = '-        "node": ">=20.0.0 <25"'
          test "$(git diff --unified=0 -- package-lock.json | grep '^+' | grep -v '^+++')" = '+        "node": "^20.19.0 || ^22.12.0 || ^24.0.0"'

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Check whitespace
        run: git diff --check

      - name: Commit validated lockfile metadata
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: align package-lock Node engine metadata"
          git push
